version: 5.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  flutter_blue_plus: ^2.2.1
  crypto: ^3.0.7
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_map: ^6.1.0
